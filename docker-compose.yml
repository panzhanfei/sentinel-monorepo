# 镜像名可通过根目录 .env 覆盖（见 README「国内拉取镜像」）
services:
  # Caddy：对外 80/443，反代宿主机 PM2（Next 3000 等）。默认不启动，使用 --profile edge
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    container_name: sentinel-caddy
    restart: unless-stopped
    profiles:
      - edge
    ports:
      - '80:80'
      - '443:443'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      SENTINEL_DOMAIN: ${SENTINEL_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy.d:/etc/caddy/caddy.d:ro
      - caddy_data:/data
      - caddy_config:/config

  # PostgreSQL: 核心业务数据库 (Prisma 强力搭档)
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:15-alpine}
    container_name: sentinel-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data
    networks:
      - sentinel-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis: Nonce 存储与 JWT 黑名单
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: sentinel-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - sentinel_redis_data:/data
    networks:
      - sentinel-network

  # RedisInsight: 可视化调试
  redis-insight:
    image: ${REDISINSIGHT_IMAGE:-redislabs/redisinsight:latest}
    container_name: sentinel-redis-insight
    ports:
      - '8001:5540'
    networks:
      - sentinel-network

  # Anvil: 本地测试链（仅绑定本机回环，避免公网暴露预置私钥）
  # 宿主机端口冲突时可在 .env 设置
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ['anvil', '--host', '0.0.0.0', '--port', '8545']
    ports:
      - '127.0.0.1:${ANVIL_RPC_HOST_PORT:-8545}:8545'

networks:
  sentinel-network:
    driver: bridge

volumes:
  sentinel_pg_data:
  sentinel_redis_data:
  caddy_data:
  caddy_config:
